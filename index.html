<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e0f13">
<title>UPSC Mains Companion</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/style.css">
<script src="libs/mammoth.browser.min.js" defer></script>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="brand">🎯 <span>Mains<b>2026</b></span></div>
    <div id="topbar-extra"></div>
  </header>

  <main id="views">
    <section id="view-listen" class="view active"></section>
    <section id="view-cards" class="view"></section>
    <section id="view-quiz" class="view"></section>
    <section id="view-practice" class="view"></section>
    <section id="view-library" class="view"></section>
  </main>

  <nav id="tabbar">
    <button data-view="listen" class="tab active"><span class="ic">🎧</span>Listen</button>
    <button data-view="cards" class="tab"><span class="ic">🃏</span>Cards</button>
    <button data-view="quiz" class="tab"><span class="ic">🧠</span>Quiz</button>
    <button data-view="practice" class="tab"><span class="ic">✍️</span>Answer</button>
    <button data-view="library" class="tab"><span class="ic">📚</span>Library</button>
  </nav>
</div>
<div id="modal-root"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
